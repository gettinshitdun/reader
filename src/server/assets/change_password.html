<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Reader</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100dvh; }
    .change-box { width: 100%; max-width: 360px; padding: 2rem; }
    .change-box h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
    .change-box .hint { margin-bottom: 1.5rem; font-size: 0.85rem; opacity: 0.7; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .field input {
      width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;
      font-size: 1rem; box-sizing: border-box;
    }
    .error { color: #c0392b; margin-bottom: 1rem; font-size: 0.9rem; }
    .submit-btn {
      width: 100%; padding: 0.6rem; font-size: 1rem;
      border: none; border-radius: 4px; cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      .field input { background: #2a2a2a; border-color: #555; color: #eee; }
    }
  </style>
</head>
<body>
  <div class="change-box entry-list">
    <h1>Change Password</h1>
    {%- if forced %}
    <p class="hint">You must set a new password before continuing.</p>
    {%- endif %}
    {%- if error %}
    <div class="error">{{ error }}</div>
    {%- endif %}
    <form method="post" action="/change-password">
      <div class="field">
        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" autocomplete="new-password" autofocus required />
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required />
      </div>
      <button type="submit" class="upload-btn submit-btn">Set password</button>
    </form>
  </div>
</body>
</html>
