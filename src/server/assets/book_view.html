<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ book_name }}</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    .book-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .book-meta { font-size: 0.8rem; opacity: 0.6; }
    .private-controls { display: flex; align-items: center; gap: 0.4rem; }
    .private-btn {
      font-size: 0.8rem; padding: 0.25rem 0.6rem; cursor: pointer;
      border: 1px solid #ccc; border-radius: 4px; background: transparent;
    }
    .private-btn.active { border-color: #e67e22; color: #e67e22; }
    .category-select {
      padding: 0.2rem 0.4rem; border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.8rem; display: none;
    }
    @media (prefers-color-scheme: dark) {
      .private-btn { border-color: #555; color: #ccc; }
      .private-btn.active { border-color: #e67e22; color: #e67e22; }
      .category-select { background: #2a2a2a; border-color: #555; color: #eee; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      {%- for crumb in breadcrumbs %}
      <span class="sep">/</span><a href="{{ crumb.url }}">{{ crumb.name }}</a>
      {%- endfor %}
    </nav>

    <div class="book-header">
      <span class="book-meta">
        {%- if uploaded_by %}Uploaded by {{ uploaded_by }}{%- endif %}
      </span>
      {%- if can_toggle %}
      <div class="private-controls">
        <select class="category-select" id="category-select">
          {%- for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {%- endfor %}
        </select>
        <button class="private-btn{% if is_private %} active{% endif %}" id="private-toggle"
                data-book-path="{{ book_path }}"
                data-private="{{ is_private }}">
          {%- if is_private %}Private{%- else %}Make private{%- endif %}
        </button>
      </div>
      {%- endif %}
    </div>

    <div class="entry-list">
      <a class="entry parent" href="../">
        <span class="icon">&#8617;</span>
        <span class="name">..</span>
      </a>
      {%- for section in sections %}
      <a class="entry" href="{{ section.filename }}">
        <span class="icon">&#128196;</span>
        <span class="name">{{ section.title }}</span>
      </a>
      {%- else %}
      <div class="entry empty">no chapters</div>
      {%- endfor %}

    </div>
  </div>

  <script>
    (function() {
      var btn = document.getElementById('private-toggle');
      if (!btn) return;
      var catSelect = document.getElementById('category-select');
      var isPrivate = btn.dataset.private === 'true';

      if (isPrivate && catSelect) catSelect.style.display = 'inline-block';

      btn.addEventListener('click', function() {
        var body = { book_path: btn.dataset.bookPath };
        if (isPrivate && catSelect) {
          var cat = catSelect.value;
          if (!cat) { catSelect.style.borderColor = '#e74c3c'; return; }
          body.category = cat;
        }
        fetch('/api/togglePrivate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.success) return;
          if (data.is_private) {
            window.location.href = '/profile';
          } else {
            var parts = data.new_path.split('/');
            window.location.href = '/' + parts[0] + '/';
          }
        })
        .catch(function() {});
      });
    })();
  </script>
</body>
</html>
